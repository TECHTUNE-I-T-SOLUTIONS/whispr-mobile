name: Auto-Release on CodeMagic Build Success

on:
  schedule:
    # Check every hour for new successful builds
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        
      - name: Check for new CodeMagic builds
        id: buildcheck
        env:
          CODEMAGIC_API_TOKEN: ${{ secrets.CODEMAGIC_API_TOKEN }}
          CODEMAGIC_APP_ID: ${{ secrets.CODEMAGIC_APP_ID }}
        run: |
          # Fetch latest successful builds from CodeMagic
          curl -s -H "x-auth-token: ${CODEMAGIC_API_TOKEN}" \
            "https://api.codemagic.io/builds?appId=${CODEMAGIC_APP_ID}&status=finished&limit=10" > builds.json
          
          # Get iOS and Android builds
          IOS_BUILD=$(jq -r '.builds[] | select(.platform == "ios" and .buildStatus == "success" and (.artifacts | length > 0)) | first' builds.json)
          ANDROID_BUILD=$(jq -r '.builds[] | select(.platform == "android" and .buildStatus == "success" and (.artifacts | length > 0)) | first' builds.json)
          
          IOS_URL=$(echo "$IOS_BUILD" | jq -r '.artifacts[0].downloadUrl // empty' 2>/dev/null)
          ANDROID_URL=$(echo "$ANDROID_BUILD" | jq -r '.artifacts[0].downloadUrl // empty' 2>/dev/null)
          
          # Get latest build timestamp
          BUILD_TIME=$(jq -r '.builds[0].finishingTime // empty' builds.json)
          
          echo "ios_url=${IOS_URL}" >> $GITHUB_OUTPUT
          echo "android_url=${ANDROID_URL}" >> $GITHUB_OUTPUT
          echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT
          
          if [ -z "$IOS_URL" ] && [ -z "$ANDROID_URL" ]; then
            echo "No successful builds with artifacts found"
            echo "has_build=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "has_build=true" >> $GITHUB_OUTPUT
          
          # Check if release already exists
          VERSION=$(cat pubspec.yaml | grep "version:" | head -1 | awk '{print $2}' | cut -d '+' -f1)
          
          # Get or create release tag
          RELEASE_TAG="v$VERSION"
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists"
            echo "should_create=false" >> $GITHUB_OUTPUT
          else
            echo "should_create=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        if: steps.buildcheck.outputs.should_create == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.buildcheck.outputs.version }}
          name: Whispr Mobile v${{ steps.buildcheck.outputs.version }}
          body: |
            🎉 **Whispr Mobile v${{ steps.buildcheck.outputs.version }}** is now available!
            
            ## 📥 Download Links
            
            ### iOS
            - **Direct Download**: [${{ steps.buildcheck.outputs.ios_url != '' && 'Download IPA' || 'Coming Soon' }}](${{ steps.buildcheck.outputs.ios_url }})
            - App Store (coming soon)
            - TestFlight
            
            ### Android
            - **Direct Download**: [${{ steps.buildcheck.outputs.android_url != '' && 'Download APK' || 'Coming Soon' }}](${{ steps.buildcheck.outputs.android_url }})
            - Google Play Store (coming soon)
            
            ## 📖 Installation Guide
            
            Visit the [Whispr Download Page](https://whispr.vercel.app/download) for detailed installation instructions.
            
            ## 📋 Release Details
            
            - **Version**: v${{ steps.buildcheck.outputs.version }}
            - **Release Date**: ${{ steps.buildcheck.outputs.build_time }}
            - **Platform**: iOS & Android
            - **Built by**: CodeMagic CI/CD
            
            ## ✨ What's Included
            
            - 📱 iOS build
            - 🤖 Android build
            - 🔐 Latest security updates
            - 🐛 Bug fixes and improvements
            
            Made with ❤️ by the Whispr team
            
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Notify download page
        if: steps.buildcheck.outputs.has_build == 'true'
        run: |
          echo "✅ Release created for v${{ steps.buildcheck.outputs.version }}"
          echo "The Whispr download page will automatically display this release."
          echo ""
          echo "📊 Build Details:"
          echo "  - Build ID: ${{ steps.buildcheck.outputs.build_id }}"
          echo "  - Status: Success"
          echo "  - Release: v${{ steps.buildcheck.outputs.version }}"
