name: Create GitHub Release from CodeMagic Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g., 1.0.0)'
        required: true
        type: string
      changelog:
        description: 'Release changelog/notes'
        required: false
        type: string
  repository_dispatch:
    types: [codemagic-build-success]

permissions:
  contents: write
  actions: read

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch latest CodeMagic builds
        id: codemagic
        env:
          CODEMAGIC_API_TOKEN: ${{ secrets.CODEMAGIC_API_TOKEN }}
          CODEMAGIC_APP_ID: ${{ secrets.CODEMAGIC_APP_ID }}
        run: |
          # Fetch latest successful builds
          RESPONSE=$(curl -s -H "x-auth-token: ${CODEMAGIC_API_TOKEN}" \
            "https://api.codemagic.io/builds?appId=${CODEMAGIC_APP_ID}&status=finished&limit=10")
          
          echo "$RESPONSE" > /tmp/builds.json
          
          # Extract download URLs from builds (CodeMagic uses "artefacts" not "artifacts")
          # Look for APK and AAB files from Android builds, IPA files from iOS builds
          IOS_URL=$(jq -r '.builds[] | select(.workflow.buildSettings.platforms[]? == "ios") | .artefacts[]? | select(.name | endswith(".ipa")) | .url | select(. != null) | first' /tmp/builds.json)
          ANDROID_URL=$(jq -r '.builds[] | select(.workflow.buildSettings.platforms[]? == "android") | .artefacts[]? | select(.name | endswith(".apk") or endswith(".aab")) | .url | select(. != null) | first' /tmp/builds.json)
          
          # Fallback: if no specific artifact found, get any artifact from successful builds
          if [ -z "$IOS_URL" ]; then
            IOS_URL=$(jq -r '.builds[] | select(.status == "finished" and (.artefacts | length > 0)) | .artefacts[]? | .url | select(. != null) | first' /tmp/builds.json | head -1)
          fi
          
          if [ -z "$ANDROID_URL" ]; then
            ANDROID_URL=$(jq -r '.builds[] | select(.status == "finished" and (.artefacts | length > 0)) | .artefacts[]? | .url | select(. != null) | first' /tmp/builds.json | tail -1)
          fi
          
          # Extract version from pubspec.yaml or use provided input
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(grep "version:" pubspec.yaml | head -1 | awk '{print $2}' | cut -d '+' -f1)
          fi
          
          # Extract changelog
          CHANGELOG="${{ github.event.inputs.changelog }}"
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="Release v${VERSION}\n\n📱 iOS and Android builds available\n\nBuilt with CodeMagic CI/CD"
          fi
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "ios_url=${IOS_URL}" >> $GITHUB_OUTPUT
          echo "android_url=${ANDROID_URL}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.codemagic.outputs.version }}
          name: Whispr v${{ steps.codemagic.outputs.version }}
          body: |
            ${{ steps.codemagic.outputs.changelog }}
            
            ## 📥 Download Links
            
            ### iOS
            - **Direct Download**: [${{ steps.codemagic.outputs.ios_url != '' && 'Download IPA' || 'Coming Soon' }}](${{ steps.codemagic.outputs.ios_url }})
            - App Store (coming soon)
            - TestFlight
            
            ### Android
            - **Direct Download**: [${{ steps.codemagic.outputs.android_url != '' && 'Download APK' || 'Coming Soon' }}](${{ steps.codemagic.outputs.android_url }})
            - Google Play Store (coming soon)
            
            ## 📖 Installation Guide
            
            Visit [Whispr Download Page](https://whispr.vercel.app/download) for detailed installation instructions.
            
            ## 📋 Release Details
            
            - **Version**: v${{ steps.codemagic.outputs.version }}
            - **Date**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
            - **Platform**: iOS & Android
            - **Build**: CodeMagic CI/CD
            
            Thank you for using Whispr! 💜
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Update website download page
        run: |
          echo "Release v${{ steps.codemagic.outputs.version }} created successfully!"
          echo "The download page will automatically fetch and display this release."
