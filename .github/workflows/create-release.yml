name: Create GitHub Release from CodeMagic Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g., 1.0.0)'
        required: true
        type: string
      changelog:
        description: 'Release changelog/notes'
        required: false
        type: string
  repository_dispatch:
    types: [codemagic-build-success]

permissions:
  contents: write
  actions: read

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch latest CodeMagic builds
        id: codemagic
        env:
          CODEMAGIC_API_TOKEN: ${{ secrets.CODEMAGIC_API_TOKEN }}
          CODEMAGIC_APP_ID: ${{ secrets.CODEMAGIC_APP_ID }}
        run: |
          # Fetch latest successful builds
          RESPONSE=$(curl -s -H "x-auth-token: ${CODEMAGIC_API_TOKEN}" \
            "https://api.codemagic.io/builds?appId=${CODEMAGIC_APP_ID}&status=finished&limit=10")
          
          echo "$RESPONSE" > /tmp/builds.json
          
          # Debug: Print response for troubleshooting
          echo "API Response:"
          cat /tmp/builds.json
          echo ""
          
          # Check if response is valid JSON and has builds
          if ! jq empty /tmp/builds.json 2>/dev/null; then
            echo "❌ Invalid API response. Check CODEMAGIC_API_TOKEN and CODEMAGIC_APP_ID"
            VERSION=$(grep "version:" pubspec.yaml | head -1 | awk '{print $2}' | cut -d '+' -f1)
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "Release v${VERSION}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "ios_url=" >> $GITHUB_OUTPUT
            echo "android_url=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Try to extract artifacts from builds
          ARTIFACTS=$(jq -r '.builds[]?.artefacts[]? | select(.url != null) | .url' /tmp/builds.json 2>/dev/null | head -5)
          
          echo "Found artifacts:"
          echo "$ARTIFACTS"
          echo ""
          
          # Extract version from pubspec.yaml or use provided input
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(grep "version:" pubspec.yaml | head -1 | awk '{print $2}' | cut -d '+' -f1)
          fi
          
          # Extract changelog
          CHANGELOG="${{ github.event.inputs.changelog }}"
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="Release v${VERSION}\n\nBuilt with CodeMagic CI/CD"
          fi
          
          # Get first artifact as download URL if available
          DOWNLOAD_URL=$(echo "$ARTIFACTS" | head -1)
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "download_url=${DOWNLOAD_URL}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.codemagic.outputs.version }}
          name: Whispr v${{ steps.codemagic.outputs.version }}
          body: |
            ${{ steps.codemagic.outputs.changelog }}
            
            ## 📥 Download
            
            ${{ steps.codemagic.outputs.download_url != '' && format('📱 [Download APK/IPA]({0})', steps.codemagic.outputs.download_url) || '🔄 Building... Download link will appear shortly' }}
            
            ## 📖 Installation Guide
            
            Visit [Whispr Download Page](https://whispr.vercel.app/download) for detailed installation instructions.
            
            ## 📋 Release Details
            
            - **Version**: v${{ steps.codemagic.outputs.version }}
            - **Date**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
            - **Built with**: CodeMagic CI/CD
            
            Thank you for using Whispr! 💜
            
            - **Version**: v${{ steps.codemagic.outputs.version }}
            - **Date**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
            - **Platform**: iOS & Android
            - **Build**: CodeMagic CI/CD
            
            Thank you for using Whispr! 💜
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Update website download page
        run: |
          echo "Release v${{ steps.codemagic.outputs.version }} created successfully!"
          echo "The download page will automatically fetch and display this release."
