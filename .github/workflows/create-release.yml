name: Publish Release from APK URL

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without prefix, for example 1.1.1'
        required: true
        type: string
      apk_url:
        description: 'Direct APK URL to download and publish'
        required: true
        type: string
      release_name:
        description: 'Release title'
        required: false
        type: string
      release_notes:
        description: 'Optional release notes'
        required: false
        type: string
      tag_name:
        description: 'Git tag to use for the release'
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          VERSION='${{ inputs.version }}'
          TAG_NAME='${{ inputs.tag_name }}'
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="v${VERSION}"
          fi

          RELEASE_NAME='${{ inputs.release_name }}'
          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="Whispr Mobile v${VERSION}"
          fi

          NOTES='${{ inputs.release_notes }}'
          if [ -z "$NOTES" ]; then
            NOTES=$(cat <<EOF
Whispr Mobile v${VERSION}

Published from a manually supplied APK URL.
EOF
)
          fi

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_notes<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download APK
        shell: bash
        run: |
          mkdir -p release-assets
          curl -L --fail --retry 3 --retry-delay 2 \
            -o "release-assets/whispr-${{ inputs.version }}.apk" \
            '${{ inputs.apk_url }}'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          body: ${{ steps.meta.outputs.release_notes }}
          files: release-assets/whispr-${{ inputs.version }}.apk
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        shell: bash
        run: |
          echo "Created release ${{ steps.meta.outputs.tag_name }}"
          echo "APK saved as a GitHub release asset."
