workflows:
  default-workflow:
    name: Default Workflow
    instance_type: mac_mini_m2
    environment:
      groups:
        - whisprmobile
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Prepare environment files
        script: |
          #!/bin/bash
          set -euo pipefail

          write_env_file() {
            local target_file="$1"
            : > "$target_file"

            for env_key in \
              API_BASE_URL \
              NEXT_PUBLIC_BASE_URL \
              SHARE_BASE_URL \
              NEXT_PUBLIC_WEB_URL \
              GEMINI_API_KEY \
              NEXT_PUBLIC_GEMINI_API_KEY \
              NEXT_PUBLIC_SUPABASE_URL \
              SUPABASE_URL \
              NEXT_PUBLIC_SUPABASE_ANON_KEY \
              SUPABASE_ANON_KEY \
              NEXT_PUBLIC_CONVEX_URL \
              CONVEX_DEPLOYMENT \
              NEXT_PUBLIC_VAPID_PUBLIC_KEY \
              VAPID_PUBLIC_KEY \
              NEXT_PUBLIC_VAPID_REALTIME_PUBLIC_KEY \
              VAPID_REALTIME_PUBLIC_KEY \
              NEXT_PUBLIC_VAPID_REALTIME_PRIVATE_KEY \
              VAPID_REALTIME_PRIVATE_KEY \
              NEXT_PUBLIC_VAPID_REALTIME_SUBJECT \
              VAPID_REALTIME_SUBJECT \
              NEXT_PUBLIC_ELEVENLABS_API_KEY \
              NEXT_PUBLIC_ELEVENLABS_VOICE_ID
            do
              env_value="${!env_key:-}"
              if [ -n "$env_value" ]; then
                printf '%s=%s\n' "$env_key" "$env_value" >> "$target_file"
              fi
            done
          }

          write_env_file .env
          cp .env .env.local

      - name: Get Flutter dependencies
        script: |
          flutter upgrade
          flutter pub get
      
      - name: Build Android Release
        script: |
          flutter build apk --release
          flutter build appbundle --release
      
      - name: Publish to GitHub
        script: |
          #!/bin/bash
          
          # Make script executable
          chmod +x ./scripts/create-github-release.sh
          
          # Run the GitHub release script
          ./scripts/create-github-release.sh
    artifacts:
      - build/app/outputs/apk/release/*.apk
      - build/app/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - techtune.it.solutions@gmail.com
        notify:
          success: true
          failure: true
